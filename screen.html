<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 抽獎機 · 大螢幕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Baloo+2:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1A0B33; --panel:#2A1454; --panel-2:#341A66; --line:#4A2C87;
    --turf:#00E6B8; --gold:#FFD400; --orange:#FF6A00; --pink:#FF2E9A;
    --chalk:#FFFFFF; --chalk-dim:#C9B8F0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--chalk);font-family:'Rajdhani',sans-serif;}
  .stadium-bg{
    position:relative;min-height:100vh;overflow:hidden;
    background:
      radial-gradient(ellipse 800px 500px at 12% -8%, rgba(255,106,0,.35), transparent 55%),
      radial-gradient(ellipse 800px 550px at 90% 0%, rgba(255,46,154,.30), transparent 55%),
      radial-gradient(ellipse 900px 600px at 50% 110%, rgba(0,230,184,.22), transparent 55%),
      linear-gradient(160deg, #1A0B33 0%, #250F4A 45%, #1A0B33 100%);
  }
  .stadium-bg::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.035) 0 3px, transparent 3px 46px);
  }
  .sport-deco{position:absolute;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  .sport-deco svg{position:absolute;fill:none;stroke:currentColor;}
  .deco-trophy{width:380px;height:420px;top:-4%;left:50%;transform:translateX(-50%);color:#fff;opacity:.05;}
  .deco-basketball{width:210px;height:210px;top:8%;left:2%;transform:rotate(-14deg);color:var(--orange);opacity:.12;}
  .deco-relay{width:190px;height:190px;top:12%;right:3%;transform:rotate(12deg);color:var(--turf);opacity:.12;}
  .deco-bubbles{width:230px;height:230px;bottom:6%;left:3%;transform:rotate(6deg);color:var(--pink);opacity:.12;}
  .deco-stretch{width:190px;height:190px;bottom:5%;right:4%;transform:rotate(-9deg);color:var(--gold);opacity:.12;}
  @media (max-width:900px){ .sport-deco{display:none;} }
  .top-bar{position:fixed;top:16px;right:16px;display:flex;gap:8px;z-index:10;}
  .chip-btn{
    font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
    padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--chalk);
    border:1px solid rgba(255,255,255,.22);cursor:pointer;transition:.15s;
  }
  .chip-btn:hover{background:rgba(255,255,255,.16);}
  .chip-btn.active{background:rgba(0,230,184,.15);color:var(--turf);border-color:rgba(0,230,184,.4);}
  .conn-badge{
    font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
    padding:6px 14px;border-radius:999px;background:rgba(0,230,184,.15);color:var(--turf);
    border:1px solid rgba(0,230,184,.4);
  }
  .conn-badge.off{background:rgba(255,46,154,.15);color:var(--pink);border-color:rgba(255,46,154,.4);}

  .draw-wrap{max-width:960px;margin:0 auto;text-align:center;padding:64px 24px 80px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:13px;letter-spacing:.15em;background:linear-gradient(90deg,var(--pink),var(--orange));
    padding:7px 18px;border-radius:999px;margin-bottom:22px;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 8px #fff;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .title-xl{font-family:'Anton',sans-serif;font-size:clamp(40px,7vw,72px);line-height:1;margin:0 0 8px;}
  .title-xl .accent{
    background:linear-gradient(90deg,var(--gold),var(--orange),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    display:inline-block;animation:huebreath 5s ease-in-out infinite;
  }
  @keyframes huebreath{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .event-name{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:clamp(16px,2.4vw,24px);
    letter-spacing:.06em;color:var(--chalk-dim);margin:0 0 8px;white-space:nowrap;
  }
  .subtitle{color:var(--chalk-dim);font-size:17px;font-weight:600;margin-bottom:44px;}

  .categories{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:920px;margin:0 auto 44px;}
  .cat-bulb{background:var(--panel);border:2px solid var(--line);border-radius:20px;padding:24px 14px 20px;transition:.2s;}
  .cat-bulb:nth-child(1){border-color:rgba(255,106,0,.5);}
  .cat-bulb:nth-child(2){border-color:rgba(0,230,184,.5);}
  .cat-bulb:nth-child(3){border-color:rgba(255,46,154,.5);}
  .cat-bulb:nth-child(4){border-color:rgba(255,212,0,.5);}
  .cat-bulb.spin-highlight{transform:translateY(-4px) scale(1.05);box-shadow:0 10px 26px -10px rgba(255,255,255,.25);}
  .cat-bulb .avatar{
    width:96px;height:96px;border-radius:50%;overflow:hidden;margin:0 auto 14px;
    background:linear-gradient(160deg,var(--panel-2),#200f42);
    display:flex;align-items:center;justify-content:center;color:var(--chalk-dim);
    border:2px solid rgba(255,255,255,.14);
  }
  .cat-bulb .avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .cat-bulb .avatar svg{width:56%;height:56%;}
  .cat-bulb .num{font-family:'Anton',sans-serif;font-size:13px;color:var(--turf);letter-spacing:.1em;}
  .cat-bulb .name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;margin-top:5px;}
  .cat-bulb .who{font-size:15px;color:var(--chalk-dim);margin-top:3px;font-weight:600;}

  .jumbotron{
    position:relative;background:linear-gradient(160deg,var(--panel-2),var(--panel) 60%, #200f42);
    border:2px solid var(--line);border-radius:28px;padding:60px 40px 48px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 30px 90px -20px rgba(255,46,154,.25);
  }
  .jumbotron::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 24px);
  }
  .sweep{
    position:absolute;top:0;bottom:0;width:260px;left:-260px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    animation:sweep 3s ease-in-out infinite;
  }
  @keyframes sweep{0%{left:-260px}55%{left:100%}100%{left:100%}}
  .burst{
    position:absolute;top:50%;left:50%;width:560px;height:560px;transform:translate(-50%,-56%);
    background:repeating-conic-gradient(from 0deg, rgba(255,212,0,.16) 0deg 10deg, transparent 10deg 20deg);
    border-radius:50%;animation:spin 14s linear infinite;pointer-events:none;opacity:0;transition:opacity .4s;
  }
  .burst.show{opacity:1;}
  @keyframes spin{to{transform:translate(-50%,-56%) rotate(360deg)}}
  .reel-label{font-family:'Baloo 2',sans-serif;font-size:14px;letter-spacing:.25em;color:var(--chalk-dim);font-weight:700;margin-bottom:18px;position:relative;}
  .reel-name{
    font-family:'Anton',sans-serif;font-size:clamp(42px,9vw,96px);position:relative;
    height:1.05em;display:flex;align-items:center;justify-content:center;margin-bottom:26px;
  }
  .reel-name.spinning span{color:var(--chalk-dim);}
  .reel-name.pop span{animation:pop 1.1s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{0%{transform:scale(.4) rotate(-6deg);opacity:0}60%{transform:scale(1.12) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  .reel-name .glow{
    background:linear-gradient(90deg,var(--gold),var(--orange),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 30px rgba(255,106,0,.45));
  }
  .ticket{
    display:inline-flex;align-items:center;gap:10px;position:relative;
    background:linear-gradient(90deg, rgba(255,212,0,.18), rgba(255,106,0,.18));
    border:2px dashed var(--gold);color:var(--gold);font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:16px;padding:12px 26px;border-radius:999px;opacity:0;transform:translateY(8px);
    transition:opacity .4s, transform .4s;
  }
  .ticket.show{opacity:1;transform:translateY(0);animation:wiggle 2.4s ease-in-out .4s infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .confetti span{position:absolute;width:8px;height:14px;opacity:.9;border-radius:2px;top:-20px;}
  .waiting-hint{color:var(--chalk-dim);font-size:14px;margin-top:14px;}

  @media (max-width:700px){ .categories{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div class="stadium-bg">
  <div class="sport-deco" aria-hidden="true">
    <svg class="deco-trophy" viewBox="0 0 100 120"><path d="M30 15h40v20a20 20 0 0 1-40 0z" stroke-width="4"/><path d="M30 20c-12 0-15 15-2 22M70 20c12 0 15 15 2 22" stroke-width="4"/><path d="M50 55v15M35 95h30M40 70h20l4 15h-28z" stroke-width="4"/></svg>
    <svg class="deco-basketball" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" stroke-width="4"/><path d="M8 50h84M50 8v84M20 20c20 20 40 20 60 0M20 80c20-20 40-20 60 0" stroke-width="4"/></svg>
    <svg class="deco-relay" viewBox="0 0 100 100"><circle cx="60" cy="18" r="9" fill="currentColor"/><path d="M60 27 L50 55 L30 70 M50 55 L70 65 M50 40 L75 30 M50 40 L35 20" stroke-width="5" stroke-linecap="round"/></svg>
    <svg class="deco-bubbles" viewBox="0 0 100 100"><circle cx="30" cy="60" r="18" stroke-width="3"/><circle cx="62" cy="35" r="12" stroke-width="3"/><circle cx="75" cy="65" r="9" stroke-width="3"/><circle cx="48" cy="80" r="6" stroke-width="3"/></svg>
    <svg class="deco-stretch" viewBox="0 0 100 100"><circle cx="50" cy="18" r="9" fill="currentColor"/><path d="M50 27 L50 55 M50 34 L25 15 M50 34 L75 15 M50 55 L25 85 M50 55 L75 85" stroke-width="5" stroke-linecap="round"/></svg>
  </div>
  <div class="top-bar">
    <button class="chip-btn" id="soundBtn" onclick="toggleAudio()">🔈 開啟音效</button>
    <button class="chip-btn" id="fsBtn" onclick="toggleFullscreen()">⛶ 全螢幕</button>
    <div class="conn-badge off" id="connBadge">連線中…</div>
  </div>
  <div class="draw-wrap">
    <div class="eyebrow"><span class="dot"></span>LIVE DRAW · 現場抽獎進行中</div>
    <p class="event-name">老爺活力總動員 2026 FamilyDay</p>
    <h1 class="title-xl"><span class="accent">MVP</span> 榮耀時刻</h1>
    <p class="subtitle">四項競賽冠軍已就位，邀請總經理開獎</p>

    <div class="categories" id="categoryBulbs"></div>

    <div class="jumbotron">
      <div class="sweep"></div>
      <div class="burst" id="burst"></div>
      <div class="confetti" id="confettiBox"></div>
      <div class="reel-label" id="reelLabel">MVP 得主</div>
      <div class="reel-name" id="reelName"><span>等待開獎</span></div>
      <div class="ticket" id="ticket">🎟 獎品：老爺一日遊券兩張</div>
    </div>
    <p class="waiting-hint">請主持人於手機後台輸入名單並按下「開始抽獎」・建議先點右上角「開啟音效」</p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ====== 請填入您自己的 Firebase 專案設定 ====== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyANPfyvEy-6ZQb0l2c2N6US1sJlVyGDuoU",
  authDomain: "mvp-lottery.firebaseapp.com",
  databaseURL: "https://mvp-lottery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mvp-lottery",
};
/* ============================================ */

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const roomRef = db.ref('mvpDraw');

let categories = [];
let lastToken = null;
let spinning = false;

// ===== 音效（Web Audio API 即時合成，不需要外部音檔） =====
let audioCtx = null;
let audioEnabled = false;

function ensureAudioCtx(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}

function toggleAudio(){
  const btn = document.getElementById('soundBtn');
  audioEnabled = !audioEnabled;
  if(audioEnabled){
    ensureAudioCtx();
    playTone(660, 0.15, 'sine', 0.25);
    btn.textContent = '🔊 音效已開啟';
    btn.classList.add('active');
    startBGM();
  } else {
    stopBGM();
    btn.textContent = '🔈 開啟音效';
    btn.classList.remove('active');
  }
}

function playTone(freq, duration, type, gainPeak, delay){
  if(!audioEnabled || !audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainPeak || 0.25, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playTick(){
  playTone(700, 0.06, 'square', 0.18);
}

function playCountdownBeep(isGo){
  playTone(isGo ? 880 : 520, isGo ? 0.35 : 0.18, 'triangle', 0.3);
}

function playFanfare(){
  [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=> playTone(f, 0.5, 'triangle', 0.28, i*0.09));
  playCheer();
}

function playCheer(){
  if(!audioEnabled || !audioCtx) return;
  const len = audioCtx.sampleRate * 0.6;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<len;i++){ data[i] = (Math.random()*2-1) * (1 - i/len); }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  noise.connect(gain).connect(audioCtx.destination);
  noise.start();
}

// ===== 開獎背景音樂（鼓點 + 貝斯律動循環，倒數開始播放到公布得主前停止） =====
let bgmTimer = null;

function startBGM(){
  if(!audioEnabled || !audioCtx) return;
  stopBGM();
  let beat = 0;
  const beatMs = 260;
  function playBeat(){
    playTone(90, 0.12, 'sine', 0.28);
    if(beat % 2 === 1){ playTone(6000, 0.03, 'square', 0.04); }
    if(beat % 4 === 0){ playTone(146.83, 0.18, 'sawtooth', 0.08); }
    beat++;
  }
  playBeat();
  bgmTimer = setInterval(playBeat, beatMs);
}

function stopBGM(){
  if(bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; }
}

// ===== 全螢幕 =====
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', ()=>{
  const btn = document.getElementById('fsBtn');
  btn.textContent = document.fullscreenElement ? '⛶ 退出全螢幕' : '⛶ 全螢幕';
  btn.classList.toggle('active', !!document.fullscreenElement);
});

const DEFAULT_AVATAR = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="38" r="20" fill="currentColor"/><path d="M15 92c0-24 16-38 35-38s35 14 35 38" fill="currentColor"/></svg>`;

function renderBulbs(){
  const box = document.getElementById('categoryBulbs');
  box.innerHTML='';
  const items = categories.length ? categories : [null,null,null,null];
  items.forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'cat-bulb';
    el.id = 'bulb'+i;
    const avatar = c && c.photo ? `<img src="${c.photo}" alt="">` : DEFAULT_AVATAR;
    el.innerHTML = `<div class="avatar">${avatar}</div><div class="num">0${i+1}${c ? ' · '+c.game : ''}</div><div class="name">冠軍</div><div class="who">${c ? c.name : '—'}</div>`;
    box.appendChild(el);
  });
}
renderBulbs();

function startCountdown(n, onDone){
  spinning = true;
  document.getElementById('burst').classList.remove('show');
  document.getElementById('ticket').classList.remove('show');
  document.getElementById('confettiBox').innerHTML='';

  const reel = document.getElementById('reelName');
  const label = document.getElementById('reelLabel');
  reel.classList.remove('spinning');
  label.textContent = '即將揭曉';
  startBGM();

  let count = n;
  function tick(){
    if(count > 0){
      reel.classList.remove('pop');
      reel.innerHTML = `<span class="glow">${count}</span>`;
      void reel.offsetWidth;
      reel.classList.add('pop');
      playCountdownBeep(false);
      count--;
      setTimeout(tick, 700);
    } else {
      reel.classList.remove('pop');
      reel.innerHTML = `<span class="glow">GO!</span>`;
      void reel.offsetWidth;
      reel.classList.add('pop');
      playCountdownBeep(true);
      setTimeout(onDone, 400);
    }
  }
  tick();
}

function runDraw(winnerIndex){
  if(categories.length===0){ spinning = false; return; }
  document.getElementById('reelLabel').textContent = '抽獎中';

  const reel = document.getElementById('reelName');
  reel.classList.add('spinning');
  reel.classList.remove('pop');

  const winner = categories[winnerIndex];
  let tick = 0;
  const totalTicks = 24;
  let delay = 70;

  function step(){
    const c = categories[tick % categories.length];
    reel.innerHTML = `<span>${c.name}</span>`;
    playTick();
    document.querySelectorAll('.cat-bulb').forEach(b=>b.classList.remove('spin-highlight'));
    const hb = document.getElementById('bulb'+(tick % categories.length));
    if(hb) hb.classList.add('spin-highlight');
    tick++;
    if(tick < totalTicks){
      delay = delay * 1.12;
      setTimeout(step, delay);
    } else {
      reel.classList.remove('spinning');
      reel.innerHTML = `<span class="glow">${winner.name}</span>`;
      reel.classList.add('pop');
      document.getElementById('reelLabel').textContent = 'MVP 得主';
      document.querySelectorAll('.cat-bulb').forEach(b=>b.classList.remove('spin-highlight'));
      const wbEl = document.getElementById('bulb'+winnerIndex);
      if(wbEl) wbEl.classList.add('spin-highlight');
      document.getElementById('burst').classList.add('show');
      document.getElementById('ticket').classList.add('show');
      playFanfare();
      spawnConfettiBurst();
      spinning = false;
    }
  }
  step();
}

function spawnConfettiBurst(){
  const colors=['#FFD400','#00E6B8','#FF2E9A','#FF6A00','#FFFFFF'];
  const box=document.getElementById('confettiBox');
  for(let i=0;i<70;i++){
    const el=document.createElement('span');
    el.style.left=(8+Math.random()*84)+'%';
    el.style.top=(-20-Math.random()*40)+'px';
    el.style.background=colors[i%colors.length];
    const duration = 1.8+Math.random()*2;
    const delay = Math.random()*0.6;
    el.style.animation=`fall ${duration}s ease-in ${delay}s forwards`;
    box.appendChild(el);
    setTimeout(()=>el.remove(), (duration+delay)*1000+200);
  }
}
const styleTag=document.createElement('style');
styleTag.innerHTML=`@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(520px) rotate(420deg);opacity:0}}`;
document.head.appendChild(styleTag);

// ===== Firebase 即時監聽 =====
let hasSeenInitialSnapshot = false;

roomRef.on('value', (snap)=>{
  document.getElementById('connBadge').textContent = '已連線';
  document.getElementById('connBadge').classList.remove('off');
  const data = snap.val();
  const isInitialSnapshot = !hasSeenInitialSnapshot;
  hasSeenInitialSnapshot = true;
  if(!data) return;

  if(Array.isArray(data.categories) && data.categories.length){
    categories = data.categories;
    if(!spinning) renderBulbs();
  }

  if(data.round){
    if(isInitialSnapshot){
      // 畫面剛連上時，只記住目前的 token，不重播殘留在資料庫裡的上一輪結果
      lastToken = data.round.token;
    } else if(data.round.token !== lastToken){
      lastToken = data.round.token;
      if(data.round.status === 'spinning' && typeof data.round.winnerIndex === 'number' && !spinning){
        renderBulbs();
        startCountdown(3, ()=> runDraw(data.round.winnerIndex));
      }
    }
  }
}, (err)=>{
  document.getElementById('connBadge').textContent = '連線失敗';
  document.getElementById('connBadge').classList.add('off');
  console.error(err);
});
</script>
</body>
</html>
